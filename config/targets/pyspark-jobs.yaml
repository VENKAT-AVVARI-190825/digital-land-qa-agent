name: pyspark-jobs
path: ~/repos/pyspark-jobs
language: python
framework: pyspark
test_framework: pytest
src_dirs: [src/jobs, src/analytics, src/infra]
test_dir: tests/
data_quality: true
# Mirror pyspark-jobs's own `make lint`: black --check + flake8.
# isort uses the black profile (see .isort.cfg) and is run via pre-commit.
# Commands run from the target repo root so .flake8 / .isort.cfg are found.
lint_commands:
  - ["black", "--check", "--quiet", "{file}"]
  - ["flake8", "{file}"]
  - ["isort", "--check-only", "--quiet", "{file}"]
notes: |
  PySpark transformations under src/jobs. Existing pytest suite in tests/{unit,integration,acceptance}.
  Prefer pyspark.sql DataFrame fixtures over real cluster runs in unit tests.
