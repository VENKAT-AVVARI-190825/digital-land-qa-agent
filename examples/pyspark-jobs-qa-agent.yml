# Example consumer workflow.
#
# Drop this into pyspark-jobs as .github/workflows/qa-agent.yml.
# When a developer pushes Python source changes to the `dev` branch, the
# QA agent generates pytest tests for each changed file and opens a PR
# back into `dev` with the staged tests. A human reviews — never auto-merge.
#
# Required repo secrets:
#   ANTHROPIC_API_KEY  (live mode; omit to run the agent in deterministic
#                       mock mode for a dry-run trial)

name: qa-agent

on:
  push:
    branches: [dev]
    paths:
      - 'src/**/*.py'
      - '!src/**/__init__.py'

permissions:
  contents: write       # open a PR with the staged tests
  pull-requests: write

concurrency:
  group: qa-agent-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pyspark-jobs at the push HEAD
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # need history to diff against github.event.before

      - name: Check out the QA agent
        uses: actions/checkout@v4
        with:
          repository: VENKAT-AVVARI-190825/digital-land-qa-agent
          ref: main
          path: .qa-agent

      - name: Run the QA agent against the changed files
        id: agent
        uses: ./.qa-agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          target: pyspark-jobs
          target-path: ${{ github.workspace }}
          base-ref: ${{ github.event.before }}
          head-ref: ${{ github.sha }}
          max-files: 5
        continue-on-error: true   # we want to PR even if some files need review

      - name: Copy staged tests into the working tree
        if: steps.agent.outputs.staged-dir != ''
        run: |
          set -euo pipefail
          rsync -av "${{ steps.agent.outputs.staged-dir }}/pyspark-jobs/tests/" tests/

      - name: Open a PR with the generated tests
        if: steps.agent.outputs.staged-dir != ''
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: qa-agent/auto-tests-${{ github.run_id }}
          base: dev
          # Only commit changes under tests/ -- keeps the action's own
          # checkout dir (.qa-agent) and any other workspace clutter out
          # of the PR diff.
          add-paths: |
            tests/**
          commit-message: |
            Agent-generated tests for changes in ${{ github.sha }}

            needs-review: ${{ steps.agent.outputs.needs-review }}
            staged-dir:   ${{ steps.agent.outputs.staged-dir }}
          title: '[qa-agent] Tests for ${{ github.event.head_commit.message }}'
          body: |
            Auto-generated by the [digital-land QA agent](https://github.com/VENKAT-AVVARI0-190825/digital-land-qa-agent).

            **Trigger:** push to `dev` (${{ github.sha }})
            **Critic verdict:** every file passed `python -m py_compile` and the lint commands declared in `config/targets/pyspark-jobs.yaml` (black + flake8 + isort). `needs-review=${{ steps.agent.outputs.needs-review }}`.

            ### Reviewer checklist
            - [ ] Tests cover the actual behaviour I intended (semantic check)
            - [ ] No live Spark / database calls in unit tests
            - [ ] Assertions are meaningful, not just "function ran without error"
            - [ ] Test names accurately describe what's verified

            The agent never edits production code in this PR.
          labels: |
            qa-agent
            tests
          draft: ${{ steps.agent.outputs.needs-review == 'true' }}
